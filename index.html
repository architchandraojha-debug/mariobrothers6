<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Group Website</title>
  <style>
    .hidden { display: none; }
  </style>
</head>
<body>
  <!-- Join Form Section -->
  <div id="join-form">
    <!-- Paste the Formfacade embed code here -->
    <!-- Example: -->
    <!-- <iframe src="<div id="ff-compose"></div>
<script async defer src="https://formfacade.com/include/113273004395302191588/form/1FAIpQLScV61TaoYrfxElDlVkLQwyT7-jSsdV5GbAI4Ru53l8t1ttiJA/classic.js?div=ff-compose"></script>" width="640" height="800" frameborder="0"></iframe> -->
  </div>

  <!-- PIN Section -->
  <div id="pin-section" class="hidden">
    <h2>Enter PIN to Access</h2>
    <input type="password" id="pin-input" placeholder="Enter PIN">
    <button onclick="checkPin()">Submit</button>
    <p id="pin-message"></p>
  </div>

  <script>
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);

      // If redirected after form submission, set flag
      if (params.get("formFilled") === "true") {
        localStorage.setItem("formFilled", "true");
      }

      // Check localStorage to decide what to show
      if (localStorage.getItem("formFilled") === "true") {
        document.getElementById("join-form").classList.add("hidden");
        document.getElementById("pin-section").classList.remove("hidden");
      }
    };

    function checkPin() {
      const pin = document.getElementById("pin-input").value;
      const message = document.getElementById("pin-message");

      // Replace "1234" with your actual PIN
      if (pin === "1234") {
        message.textContent = "Access granted!";
        // Redirect or show protected content here
      } else {
        message.textContent = "Incorrect PIN. Try again.";
      }
    }
  </script>
</body>
</html>
