<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MARIO BROTHERS</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; }
    .hidden { display: none; }
    .box { border: 1px solid #ccc; padding: 20px; margin: 20px auto; width: 400px; border-radius: 8px; background: #fff; }
    input, button { padding: 8px; margin-top: 10px; width: 90%; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>Welcome to MARIO BROTHERS</h1>

  <!-- Join Request Form -->
  <div class="box" id="join-form">
    <h2>Request to Join</h2>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScV61TaoYrfxElDlVkLQwyT7-jSsdV5GbAI4Ru53l8t1ttiJA/viewform?usp=header/viewform?embedded=true" 
            width="100%" height="500" frameborder="0" marginheight="0" marginwidth="0">
      Loading…
    </iframe>
    <button onclick="markFormFilled()">I have submitted the form</button>
  </div>

  <!-- PIN Entry -->
  <div class="box" id="pin-section">
    <h2>Enter PIN</h2>
    <input type="password" id="pinInput" placeholder="Enter PIN">
    <button onclick="checkPin()">Submit</button>
    <p id="pinMessage"></p>
  </div>

  <!-- Notice Board -->
  <div class="box hidden" id="notice-board">
    <h2>Group Notice Board</h2>
    <p><strong>Notice 1:</strong> Welcome new members!</p>
    <p><strong>Notice 2:</strong> Meeting scheduled for Friday.</p>
    <button onclick="throwOut()">Throw Out Member</button>
  </div>

  <script>
    // Approved member PINs
    let validPins = { "TECHNOLOGIA" :true, "AURA COMES BACK": true,   "spiderman":true, ",  " THIS IS THE END": true, " RADHE RADHE": true, "LOL": true,  "DHURANDHAR": true   };

    // Admin PIN
    const adminPin = "SUPERADMIN456";

    // Check if user already filled the form before
    window.onload = function() {
      if (localStorage.getItem("formFilled") === "true") {
        document.getElementById("join-form").classList.add("hidden");
      }
    };

    function markFormFilled() {
      localStorage.setItem("formFilled", "true");
      document.getElementById("join-form").classList.add("hidden");
      alert("Form marked as submitted. Next time you’ll only see the PIN box.");
    }

    function checkPin() {
      const pin = document.getElementById("pinInput").value.trim();
      if (validPins[pin]) {
        document.getElementById("pin-section").classList.add("hidden");
        document.getElementById("notice-board").classList.remove("hidden");
      } else {
        document.getElementById("pinMessage").innerText = "Invalid PIN.";
      }
    }

    function throwOut() {
      const enteredAdminPin = prompt("Enter ADMIN PIN to continue:");
      if (enteredAdminPin === adminPin) {
        const pinToRemove = prompt("Enter the PIN of the member to throw out:");
        if (pinToRemove && validPins[pinToRemove]) {
          delete validPins[pinToRemove];
          alert("Member with PIN " + pinToRemove + " has been thrown out.");
        } else {
          alert("PIN not found or already removed.");
        }
      } else {
        alert("Incorrect ADMIN PIN. Access denied.");
      }
    }
  </script>
</body>
</html>
